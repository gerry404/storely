<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta -->
    <meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Storely" />
    <meta name="msapplication-TileColor" content="#FF6B2C" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Storely" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />

    <!-- iOS Splash Screens (most common sizes) -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" />

    <!-- SEO -->
    <meta name="description" content="Storely - Créez votre vitrine digitale en 10 minutes. La plateforme e-commerce pour les entrepreneurs." />
    <meta name="keywords" content="boutique en ligne, e-commerce, vitrine digitale, storely, vente en ligne" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Storely - Votre Vitrine Digitale" />
    <meta property="og:description" content="Créez et gérez votre boutique en ligne. Produits, commandes, clients — tout dans votre poche." />
    <meta property="og:image" content="/logo.png" />

    <title>Storely</title>

    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="app"></div>
    <script async src="https://checkout.flutterwave.com/v3.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
