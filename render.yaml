# Render Blueprint — Auto-deploy configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: storely-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: APP_NAME
        value: Storely
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://storely-api.onrender.com
      - key: FRONTEND_URL
        value: https://storely.vercel.app
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr
